# ============================================================
# Remote Rocket — Target Company Career Pages
# ============================================================
# Add a company name and careers URL. The scraper auto-detects
# the ATS (Greenhouse, Ashby, Lever) from the URL and fetches
# jobs via API. If no API is found, it falls back to Crawl4AI.
#
# Fields:
#   name          (required) Company display name
#   careers_url   (required) URL to the jobs/careers listing page
#   high_priority (optional) true = scraped every run; false/omitted = every other run
#   notes         (optional) Reminders or quirks
# ============================================================

companies:

  # --- Agencies ---

  - name: "Tinuiti"
    careers_url: "https://tinuiti.wd12.myworkdayjobs.com/Tinuiti"
    high_priority: true
    notes: "Workday — auto-detected, Crawl4AI fallback"

  - name: "Wpromote"
    careers_url: "https://www.wpromote.com/careers"
    high_priority: true

  - name: "Logical Position"
    careers_url: "https://www.logicalposition.com/careers"
    high_priority: true

  - name: "PMG"
    careers_url: "https://job-boards.greenhouse.io/pmg"
    high_priority: true

  - name: "Jellyfish"
    careers_url: "https://jobs.ashbyhq.com/jellyfishcareers"
    high_priority: true

  - name: "Directive Consulting"
    careers_url: "https://directiveconsulting.com/careers/"
    high_priority: false

  - name: "NP Digital"
    careers_url: "https://npdigital.com/careers/"
    high_priority: false

  - name: "Seer Interactive"
    careers_url: "https://jobs.lever.co/seerinteractive"
    high_priority: false

  # --- SaaS / Tech ---

  - name: "HubSpot"
    careers_url: "https://boards.greenhouse.io/hubspot"
    high_priority: false

  - name: "Klaviyo"
    careers_url: "https://boards.greenhouse.io/klaviyo"
    high_priority: false

  - name: "Semrush"
    careers_url: "https://www.semrush.com/careers/"
    high_priority: false

  - name: "Bazaarvoice"
    careers_url: "https://www.bazaarvoice.com/careers/"
    high_priority: false

  - name: "ClickUp"
    careers_url: "https://clickup.com/careers"
    high_priority: false

  # ── How to add a company ─────────────────────────────────
  # 1. Find their careers page URL
  # 2. If the URL contains greenhouse.io, ashbyhq.com, or lever.co → paste it directly
  # 3. If it's on their own domain → paste it anyway; the scraper will probe APIs automatically
  # 4. Set high_priority: true if they hire remote PPC roles frequently
