# ============================================================
# Remote Rocket — Target Company Career Pages
# ============================================================
# Add companies here to scrape their career pages directly.
# These "hidden gem" jobs often appear here before job boards.
#
# Fields:
#   name          (required) Company display name
#   careers_url   (required) Direct URL to the jobs/careers listing page
#   high_priority (optional) true = scraped every run
#                            false/omitted = scraped every other run
#   notes         (optional) Reminder about the company or page quirks
# ============================================================

