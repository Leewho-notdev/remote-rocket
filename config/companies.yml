# ============================================================
# Remote Rocket — Target Company Career Pages
# ============================================================
# Add companies here to scrape their career pages directly.
# These "hidden gem" jobs often appear here before job boards.
#
# Fields:
#   name          (required) Company display name
#   careers_url   (required) Direct URL to the jobs/careers listing page
#   ats           (optional) ATS type: "greenhouse", "lever", or "crawl4ai"
#                            Defaults to "crawl4ai" if not set.
#   ats_slug      (required for greenhouse/lever) The company slug used in the ATS API.
#                   Greenhouse: verify at https://boards.greenhouse.io/{slug}/jobs
#                   Lever:      verify at https://jobs.lever.co/{slug}
#   high_priority (optional) true = scraped every run
#                            false/omitted = scraped every other run
#   notes         (optional) Reminder about the company or page quirks
# ============================================================

companies:

  # --- Agencies (highest volume of relevant remote PPC roles) ---

  - name: "Tinuiti"
    careers_url: "https://tinuiti.com/careers/"
    ats: "greenhouse"
    ats_slug: "tinuiti"
    high_priority: true
    notes: "Large performance agency. Strong remote culture."

  - name: "Wpromote"
    careers_url: "https://www.wpromote.com/careers"
    ats: "greenhouse"
    ats_slug: "wpromote"
